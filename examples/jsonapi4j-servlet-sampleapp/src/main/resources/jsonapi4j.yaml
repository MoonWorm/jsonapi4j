# JsonApi4j core settings
rootPath: /jsonapi

# CD Plugin
cd:
  enabled: true
  maxHops: 3
  propagation:
    - FIELDS
    - CUSTOM_QUERY_PARAMS
    - HEADERS
  deduplicateResources: true
  httpConnectTimeoutMs: 5000
  httpTotalTimeoutMs: 10000
  mapping:
    users: http://localhost:8080/jsonapi
    countries: http://localhost:8080/jsonapi
    currencies: http://localhost:8080/jsonapi

# AC Plugin
ac:
  enabled: true

# Sparse Fieldsets Plugin
sf:
  enabled: true
  requestedFieldsDontExistMode: SPARSE_ALL_FIELDS

# OAS Plugin
oas:
  enabled: true
  oasRootPath: /jsonapi/oas
  info:
    title: JSON:API Users & Countries
    version: 1.0.0
    description: JSON:API Users & Countries Spring Boot Sample App
    contact:
      name: John Doe
      url: http://users.foo.bar/john
      email: john.doe@foo.bar
    license:
      name: Apache 2.0
      url: https://www.apache.org/licenses/LICENSE-2.0
  externalDocumentation:
    url: http://foo.bar.docs/article-1
    description: Extra documentation description

  oauth2:
    clientCredentials:
      name: Client_Credentials
      description: Use this grant flow to access non-personalized data.
      tokenUrl: http://foo.bar/tokenUrl
    authorizationCodeWithPkce:
      name: Authorization_Code_With_PKCE
      description: Use this grant flow to access personalized user data.
      tokenUrl: http://foo.bar/tokenUrl
      authorizationUrl: http://foo.bar/authorizationUrl
      scopes:
        - name: users.read
          description: Read-only access to a user data
  servers:
    - name: Localhost
      enabled: true
      url: http://localhost:8080
    - name: Staging
      enabled: false
      url: https://api.stage.com
    - name: Production
      enabled: false
      url: https://api.com
  customResponseHeaders:
    - httpStatusCode: 429
      headers:
        - name: X-RateLimit-Remaining
          description: Number of tokens currently remaining. Refer to X-RateLimit-Replenish-Rate header for replenishment information.
          required: true
          schema: integer
          example: 5
        - name: X-RateLimit-Burst-Capacity
          description: Initial number of tokens, and max number of tokens that can be replenished.
          required: true
          schema: integer
          example: 20
        - name: X-RateLimit-Replenish-Rate
          description: Number of tokens replenished per second.
          required: true
          schema: integer
          example: 5
        - name: X-RateLimit-Requested-Tokens
          description: Request cost in tokens.
          required: true
          schema: integer
          example: 5

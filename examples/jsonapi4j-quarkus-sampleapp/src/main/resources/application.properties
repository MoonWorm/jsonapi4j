quarkus.http.port=8080
smallrye.config.mapping.validate-unknown=false

# JsonApi4j core settings
jsonapi4j.rootPath=/jsonapi
jsonapi4j.cd.enabled=true
jsonapi4j.cd.maxHops=3
jsonapi4j.cd.errorStrategy=IGNORE
jsonapi4j.cd.mapping.users=http://localhost:${quarkus.http.port}${jsonapi4j.rootPath}
jsonapi4j.cd.mapping.countries=http://localhost:${quarkus.http.port}${jsonapi4j.rootPath}
jsonapi4j.cd.mapping.currencies=http://localhost:${quarkus.http.port}${jsonapi4j.rootPath}

# AC Plugin
jsonapi4j.ac.enabled=true

# Sparse Fieldsets Plugin
jsonapi4j.sf.enabled=true
jsonapi4j.sf.requestedFieldsDontExistMode=SPARSE_ALL_FIELDS

# OAS Plugin
jsonapi4j.oas.enabled=true
jsonapi4j.oas.oasRootPath=/jsonapi/oas
jsonapi4j.oas.info.title=JSON:API Users & Countries
jsonapi4j.oas.info.version=1.0.0
jsonapi4j.oas.info.description=JSON:API Users & Countries Quarkus Sample App
jsonapi4j.oas.info.contact.name=John Doe
jsonapi4j.oas.info.contact.url=http://users.foo.bar/john
jsonapi4j.oas.info.contact.email=john.doe@foo.bar
jsonapi4j.oas.info.license.name=Apache 2.0
jsonapi4j.oas.info.license.url=https://www.apache.org/licenses/LICENSE-2.0
jsonapi4j.oas.externalDocumentation.url=http://foo.bar.docs/article-1
jsonapi4j.oas.externalDocumentation.description=Extra documentation description
jsonapi4j.oas.oauth2.clientCredentials.name=Client_Credentials
jsonapi4j.oas.oauth2.clientCredentials.description=Use this grant flow to access non-personalized data.
jsonapi4j.oas.oauth2.clientCredentials.tokenUrl=http://foo.bar/tokenUrl
jsonapi4j.oas.oauth2.authorizationCodeWithPkce.name=Authorization_Code_With_PKCE
jsonapi4j.oas.oauth2.authorizationCodeWithPkce.description=Use this grant flow to access personalized user data.
jsonapi4j.oas.oauth2.authorizationCodeWithPkce.tokenUrl=http://foo.bar/tokenUrl
jsonapi4j.oas.oauth2.authorizationCodeWithPkce.authorizationUrl=http://foo.bar/authorizationUrl
jsonapi4j.oas.oauth2.authorizationCodeWithPkce.scopes[0].name=users.read
jsonapi4j.oas.oauth2.authorizationCodeWithPkce.scopes[0].description=Read-only access to a user data
jsonapi4j.oas.servers[0].name=Localhost
jsonapi4j.oas.servers[0].enabled=true
jsonapi4j.oas.servers[0].url=http://localhost:${quarkus.http.port}
jsonapi4j.oas.servers[1].name=Staging
jsonapi4j.oas.servers[1].enabled=false
jsonapi4j.oas.servers[1].url=https://api.stage.com
jsonapi4j.oas.servers[2].name=Production
jsonapi4j.oas.servers[2].enabled=false
jsonapi4j.oas.servers[2].url=https://api.com
jsonapi4j.oas.customResponseHeaders[0].httpStatusCode=429
jsonapi4j.oas.customResponseHeaders[0].headers[0].name=X-RateLimit-Remaining
jsonapi4j.oas.customResponseHeaders[0].headers[0].description=Number of tokens currently remaining. Refer to X-RateLimit-Replenish-Rate header for replenishment information.
jsonapi4j.oas.customResponseHeaders[0].headers[0].required=true
jsonapi4j.oas.customResponseHeaders[0].headers[0].schema=integer
jsonapi4j.oas.customResponseHeaders[0].headers[0].example=5
jsonapi4j.oas.customResponseHeaders[0].headers[1].name=X-RateLimit-Burst-Capacity
jsonapi4j.oas.customResponseHeaders[0].headers[1].description=Initial number of tokens, and max number of tokens that can be replenished.
jsonapi4j.oas.customResponseHeaders[0].headers[1].required=true
jsonapi4j.oas.customResponseHeaders[0].headers[1].schema=integer
jsonapi4j.oas.customResponseHeaders[0].headers[1].example=20
jsonapi4j.oas.customResponseHeaders[0].headers[2].name=X-RateLimit-Replenish-Rate
jsonapi4j.oas.customResponseHeaders[0].headers[2].description=Number of tokens replenished per second.
jsonapi4j.oas.customResponseHeaders[0].headers[2].required=true
jsonapi4j.oas.customResponseHeaders[0].headers[2].schema=integer
jsonapi4j.oas.customResponseHeaders[0].headers[2].example=5
jsonapi4j.oas.customResponseHeaders[0].headers[3].name=X-RateLimit-Requested-Tokens
jsonapi4j.oas.customResponseHeaders[0].headers[3].description=Request cost in tokens.
jsonapi4j.oas.customResponseHeaders[0].headers[3].required=true
jsonapi4j.oas.customResponseHeaders[0].headers[3].schema=integer
jsonapi4j.oas.customResponseHeaders[0].headers[3].example=5

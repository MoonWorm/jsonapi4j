quarkus.http.test-port=8081

jsonapi4j.compoundDocs.enabled=true
jsonapi4j.compoundDocs.maxHops=3
jsonapi4j.compoundDocs.mapping.users=http://localhost:${quarkus.http.test-port}${jsonapi4j.rootPath}
jsonapi4j.compoundDocs.mapping.countries=http://localhost:${quarkus.http.test-port}${jsonapi4j.rootPath}
jsonapi4j.compoundDocs.mapping.currencies=http://localhost:${quarkus.http.test-port}${jsonapi4j.rootPath}

jsonapi4j.oas.enabled=false
jsonapi4j.ac.enabled=true
jsonapi4j.sf.enable=false

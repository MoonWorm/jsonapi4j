quarkus.http.test-port=8081

jsonapi4j.cd.enabled=true
jsonapi4j.cd.maxHops=3
jsonapi4j.cd.mapping.users=http://localhost:${quarkus.http.test-port}${jsonapi4j.rootPath}
jsonapi4j.cd.mapping.countries=http://localhost:${quarkus.http.test-port}${jsonapi4j.rootPath}
jsonapi4j.cd.mapping.currencies=http://localhost:${quarkus.http.test-port}${jsonapi4j.rootPath}

jsonapi4j.oas.enabled=false
jsonapi4j.ac.enabled=false
jsonapi4j.sf.enable=true

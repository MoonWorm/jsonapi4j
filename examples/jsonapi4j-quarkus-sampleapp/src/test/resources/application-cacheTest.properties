quarkus.http.test-port=8080

jsonapi4j.cd.enabled=true
jsonapi4j.cd.maxHops=3
jsonapi4j.cd.cache.enabled=true
jsonapi4j.cd.cache.maxSize=100

# Map the CD-included types to the in-app counting downstream target (QuarkusCacheTestResource),
# so the tests can observe how many times each type is actually fetched over HTTP.
jsonapi4j.cd.mapping.countries=http://localhost:${quarkus.http.port}/test-api
jsonapi4j.cd.mapping.currencies=http://localhost:${quarkus.http.port}/test-api

jsonapi4j.meta.enabled=false
jsonapi4j.oas.enabled=false
jsonapi4j.ac.enabled=false
jsonapi4j.sf.enabled=false

server:
  port: 9394

jsonapi4j:
  rootPath: /jsonapi

  cd:
    enabled: true
    maxHops: 3
    cache:
      enabled: true
      maxSize: 100
    # Map the CD-included types to the in-app counting downstream target (CacheTestController),
    # so the tests can observe how many times each type is actually fetched over HTTP.
    mapping:
      countries: http://localhost:${server.port}/test-api
      currencies: http://localhost:${server.port}/test-api
  ac:
    enabled: false
  oas:
    enabled: false
  sf:
    enabled: false

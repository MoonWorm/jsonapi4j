<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 870 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#444"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#e94560"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#aaa"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <!-- Plugin icon (puzzle piece) -->
    <symbol id="plugin-icon" viewBox="0 0 24 24">
      <path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-2 .9-2 2v3.8h1.5c1.52 0 2.75 1.23 2.75 2.75S5.02 16.3 3.5 16.3H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.52 1.23-2.75 2.75-2.75s2.75 1.23 2.75 2.75V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z" fill="#fff" opacity="0.5"/>
    </symbol>
  </defs>

  <!-- ==================== Main pipeline ==================== -->

  <!-- API Request (start node) -->
  <g transform="translate(20, 85)">
    <rect x="0" y="0" width="100" height="50" rx="25" fill="#1a1a2e" filter="url(#shadow)"/>
    <text x="50" y="30" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">API Request</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="120" y1="110" x2="148" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 1: On Data Pre Retrieval (plugin) -->
  <g transform="translate(150, 60)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#0f3460" filter="url(#shadow)"/>
    <use href="#plugin-icon" x="6" y="4" width="16" height="16"/>
    <text x="70" y="28" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="700">On Data</text>
    <text x="70" y="43" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="700">Pre Retrieval</text>
    <line x1="12" y1="54" x2="128" y2="54" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="70" y="70" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">Run Registered Plugins</text>
    <text x="70" y="88" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">DO NOTHING · RETURN DOC · MUTATE REQUEST</text>
  </g>

  <!-- Return Doc exit arrow from stage 1 -->
  <line x1="220" y1="160" x2="220" y2="185" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="220" y="202" text-anchor="middle" fill="#e94560" font-size="8" font-weight="600" font-style="italic">Return Doc</text>

  <!-- Arrow 2 -->
  <line x1="290" y1="110" x2="318" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Data Retrieval (core) -->
  <g transform="translate(320, 68)">
    <rect x="0" y="0" width="140" height="84" rx="8" fill="#fff" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
    <ellipse cx="14" cy="10" rx="5" ry="2.5" fill="none" stroke="#0f3460" stroke-width="1" opacity="0.4"/>
    <text x="70" y="30" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="700">Data Retrieval</text>
    <line x1="12" y1="40" x2="128" y2="40" stroke="#eee" stroke-width="1"/>
    <text x="70" y="56" text-anchor="middle" fill="#666" font-size="9">Fetch Downstream Data</text>
    <text x="70" y="74" text-anchor="middle" fill="#999" font-size="8" font-style="italic">Heavy I/O operation</text>
  </g>

  <!-- Empty response branch -->
  <line x1="390" y1="152" x2="390" y2="185" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-muted)"/>
  <text x="390" y="200" text-anchor="middle" fill="#888" font-size="8" font-style="italic">Empty?</text>
  <text x="390" y="212" text-anchor="middle" fill="#888" font-size="7.5">Generate Empty Doc</text>

  <!-- Arrow 3 -->
  <line x1="460" y1="110" x2="488" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: On Data Post Retrieval (plugin) -->
  <g transform="translate(490, 60)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#0f3460" filter="url(#shadow)"/>
    <use href="#plugin-icon" x="6" y="4" width="16" height="16"/>
    <text x="70" y="28" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="700">On Data</text>
    <text x="70" y="43" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="700">Post Retrieval</text>
    <line x1="12" y1="54" x2="128" y2="54" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="70" y="70" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">Run Registered Plugins</text>
    <text x="70" y="88" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">DO NOTHING · RETURN DOC · MUTATE DOC</text>
  </g>

  <!-- Return Doc exit arrow from stage 3 -->
  <line x1="560" y1="160" x2="560" y2="185" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="560" y="202" text-anchor="middle" fill="#e94560" font-size="8" font-weight="600" font-style="italic">Return Doc</text>

  <!-- Arrow 4 -->
  <line x1="630" y1="110" x2="658" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Compose JSON:API Response (core) -->
  <g transform="translate(660, 68)">
    <rect x="0" y="0" width="140" height="84" rx="8" fill="#fff" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="28" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="700">Compose JSON:API</text>
    <text x="70" y="43" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="700">Response</text>
    <line x1="12" y1="52" x2="128" y2="52" stroke="#eee" stroke-width="1"/>
    <text x="70" y="67" text-anchor="middle" fill="#666" font-size="9">Build JSON:API Document</text>
    <text x="70" y="79" text-anchor="middle" fill="#999" font-size="7.5" font-style="italic">Standardized step</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(20, 250)">
    <!-- Plugin stage legend -->
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#0f3460"/>
    <text x="20" y="11" fill="#444" font-size="10">Plugin stage — extensible via Visitor pattern</text>

    <!-- Core stage legend -->
    <rect x="0" y="22" width="14" height="14" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="20" y="33" fill="#444" font-size="10">Core stage — standardized processing</text>

    <!-- Exit path legend -->
    <line x1="0" y1="51" x2="14" y2="51" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="20" y="55" fill="#444" font-size="10">Early exit — plugin returns document immediately</text>
  </g>

  <!-- Converging Return Doc exit paths to Final Response -->
  <path d="M220,210 L220,300 L350,340" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.4"/>
  <path d="M560,210 L560,300 L500,340" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.4"/>

  <!-- Empty doc exit to Final Response -->
  <path d="M390,218 L390,340 L355,340" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-muted)"/>

  <!-- Main pipeline end arrow to Final Response -->
  <path d="M800,110 L840,110 L840,340 L545,340" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Final Response (end node) -->
  <rect x="20" y="320" width="830" height="40" rx="20" fill="#1a1a2e" opacity="0.06"/>
  <rect x="330" y="324" width="200" height="32" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="430" y="345" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Final JSON:API Response</text>

</svg>

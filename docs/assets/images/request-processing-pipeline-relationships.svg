<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 390" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#444"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#e94560"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#aaa"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <symbol id="plugin-icon" viewBox="0 0 24 24">
      <path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-2 .9-2 2v3.8h1.5c1.52 0 2.75 1.23 2.75 2.75S5.02 16.3 3.5 16.3H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.52 1.23-2.75 2.75-2.75s2.75 1.23 2.75 2.75V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z" fill="#fff" opacity="0.5"/>
    </symbol>
  </defs>

  <!-- API Request (start node) -->
  <g transform="translate(20, 87)">
    <rect x="0" y="0" width="95" height="46" rx="23" fill="#1a1a2e" filter="url(#shadow)"/>
    <text x="47" y="28" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">API Request</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="115" y1="110" x2="143" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 1: On Data Pre Retrieval (plugin) -->
  <g transform="translate(145, 50)">
    <rect x="0" y="0" width="120" height="120" rx="8" fill="#0f3460" filter="url(#shadow)"/>
    <use href="#plugin-icon" x="5" y="4" width="14" height="14"/>
    <text x="60" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">On Data</text>
    <text x="60" y="41" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Pre Retrieval</text>
    <line x1="10" y1="50" x2="110" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="60" y="65" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="8.5">Run Registered Plugins</text>
    <line x1="10" y1="74" x2="110" y2="74" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="60" y="88" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">DO NOTHING</text>
    <text x="60" y="100" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">RETURN DOC</text>
    <text x="60" y="112" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">MUTATE REQUEST</text>
  </g>

  <!-- Return Doc exit arrow from stage 1 -->
  <line x1="205" y1="170" x2="205" y2="195" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="205" y="210" text-anchor="middle" fill="#e94560" font-size="8" font-weight="600" font-style="italic">Return Doc</text>

  <!-- Arrow 2 -->
  <line x1="265" y1="110" x2="293" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Data Retrieval (core) -->
  <g transform="translate(295, 68)">
    <rect x="0" y="0" width="130" height="84" rx="8" fill="#fff" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
    <ellipse cx="14" cy="10" rx="5" ry="2.5" fill="none" stroke="#0f3460" stroke-width="1" opacity="0.4"/>
    <text x="65" y="30" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-weight="700">Data Retrieval</text>
    <line x1="10" y1="40" x2="120" y2="40" stroke="#eee" stroke-width="1"/>
    <text x="65" y="56" text-anchor="middle" fill="#666" font-size="9">Fetch Downstream Data</text>
    <text x="65" y="74" text-anchor="middle" fill="#999" font-size="8" font-style="italic">Heavy I/O operation</text>
  </g>

  <!-- Empty response branch -->
  <line x1="360" y1="152" x2="360" y2="195" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-muted)"/>
  <text x="360" y="208" text-anchor="middle" fill="#888" font-size="8" font-style="italic">Empty?</text>
  <text x="360" y="220" text-anchor="middle" fill="#888" font-size="7.5">Generate Empty Doc</text>

  <!-- Arrow 3 -->
  <line x1="425" y1="110" x2="453" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: On Data Post Retrieval (plugin) -->
  <g transform="translate(455, 50)">
    <rect x="0" y="0" width="120" height="120" rx="8" fill="#0f3460" filter="url(#shadow)"/>
    <use href="#plugin-icon" x="5" y="4" width="14" height="14"/>
    <text x="60" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">On Data</text>
    <text x="60" y="41" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Post Retrieval</text>
    <line x1="10" y1="50" x2="110" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="60" y="65" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="8.5">Run Registered Plugins</text>
    <line x1="10" y1="74" x2="110" y2="74" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="60" y="88" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">DO NOTHING</text>
    <text x="60" y="100" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">RETURN DOC</text>
    <text x="60" y="112" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7.5" font-weight="500">MUTATE DOC</text>
  </g>

  <!-- Return Doc exit arrow from stage 3 -->
  <line x1="515" y1="170" x2="515" y2="195" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="515" y="210" text-anchor="middle" fill="#e94560" font-size="8" font-weight="600" font-style="italic">Return Doc</text>

  <!-- Arrow 4 -->
  <line x1="575" y1="110" x2="603" y2="110" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Compose JSON:API Response (core) -->
  <g transform="translate(605, 68)">
    <rect x="0" y="0" width="130" height="84" rx="8" fill="#fff" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="28" text-anchor="middle" fill="#1a1a2e" font-size="10.5" font-weight="700">Compose JSON:API</text>
    <text x="65" y="42" text-anchor="middle" fill="#1a1a2e" font-size="10.5" font-weight="700">Response</text>
    <line x1="10" y1="51" x2="120" y2="51" stroke="#eee" stroke-width="1"/>
    <text x="65" y="66" text-anchor="middle" fill="#666" font-size="9">Build JSON:API Document</text>
    <text x="65" y="78" text-anchor="middle" fill="#999" font-size="7.5" font-style="italic">Standardized step</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(20, 258)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#0f3460"/>
    <text x="20" y="11" fill="#444" font-size="10">Plugin stage — extensible via Visitor pattern</text>

    <rect x="0" y="22" width="14" height="14" rx="3" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="20" y="33" fill="#444" font-size="10">Core stage — standardized processing</text>

    <line x1="0" y1="51" x2="14" y2="51" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="20" y="55" fill="#444" font-size="10">Early exit — plugin returns document immediately</text>
  </g>

  <!-- Converging Return Doc exit paths to Final Response -->
  <path d="M205,218 L205,310 L340,348" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.4"/>
  <path d="M515,218 L515,310 L460,348" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.4"/>

  <!-- Empty doc exit to Final Response -->
  <path d="M360,226 L360,348 L345,348" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-muted)"/>

  <!-- Main pipeline end arrow to Final Response -->
  <path d="M735,110 L790,110 L790,348 L505,348" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Final Response (end node) -->
  <rect x="20" y="330" width="780" height="38" rx="19" fill="#1a1a2e" opacity="0.06"/>
  <rect x="300" y="333" width="200" height="32" rx="16" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="400" y="354" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Final JSON:API Response</text>

</svg>

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-feed

title: "JsonApi4j"
subtitle: "JSON:API Specification Framework for Java"
description: "Lightweight Java framework for building REST APIs compliant with the JSON:API specification. Works with Spring Boot, Quarkus, and Jakarta Servlet API."
url: "https://api4.pro"
baseurl: ""

minimal_mistakes_skin: "default"

logo: "/assets/images/jsonapi4j-logo-square-small.png"

show_downloads: false

# SEO
locale: "en-US"
og_image: "/assets/images/jsonapi4j-logo-square-small.png"

# Google Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-PPXZJ7J78G"
    anonymize_ip: true

# Site author (shown in sidebar on blog posts)
author:
  name: "JsonApi4j"
  avatar: "/assets/images/jsonapi4j-logo-square-small.png"
  bio: "JSON:API Specification Framework for Java"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MoonWorm/jsonapi4j"

# Site footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MoonWorm/jsonapi4j"

# Reading files
include:
  - _pages

# Front matter defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: docs
      toc: false
      sidebar:
        nav: "docs"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      toc: true
      toc_sticky: true
      show_date: true
      read_time: true
      share: true
      related: true

# Category archive
category_archive:
  type: liquid
  path: /categories/
